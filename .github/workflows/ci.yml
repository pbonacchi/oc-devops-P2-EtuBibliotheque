name: CI Frontend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      # Récupérer le code source
      - name: Checkout
        uses: actions/checkout@v4

      # Installer Node.js + activer le cache des dépendances basé sur package-lock.json (versions vérouillées)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # Installer les dépendances (clean install: pas gestion de versions, utilisation de package-lock.json)
      - name: Install dependencies
        run: npm ci

      # Tests unitaires Jest (couverture + seuil minimum 80 %)
      - name: Run Jest unit tests
        run: npm test
        env:
          CI: true

      # Tests E2E Cypress avec couverture instrumentée
      - name: Run Cypress E2E tests with coverage
        run: npm run e2e:coverage
        env:
          CI: true

      # Publier le rapport de couverture Jest
      - name: Upload Jest coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-jest
          path: coverage/
          if-no-files-found: ignore

      # Publier le rapport de couverture Cypress
      - name: Upload Cypress coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage-e2e/
          if-no-files-found: ignore

      # Conserver les artefacts Cypress si échec
      - name: Upload Cypress artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore


